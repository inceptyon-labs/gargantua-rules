name: Validate Rules

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate rule YAML
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate rules
        run: Scripts/validate-rules.sh
